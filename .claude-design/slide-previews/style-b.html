<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B: Paper & Ink</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* === RESET & BASE === */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  /* === COLORS === */
  :root {
    --bg-cream: #faf9f7;
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-muted: #999;
    --accent-crimson: #c41e3a;
    --accent-line: #ddd;
    --title-size: clamp(2rem, 5vw, 4rem);
    --body-size: clamp(0.8rem, 1.4vw, 1.1rem);
    --small-size: clamp(0.6rem, 1vw, 0.8rem);
  }

  /* === SLIDE === */
  .slide {
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden;
    background: var(--bg-cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: 'Source Serif 4', serif;
  }

  /* === DECORATIVE ELEMENTS === */
  .top-rule {
    position: absolute;
    top: clamp(2rem, 5vh, 4rem);
    left: 50%;
    transform: translateX(-50%);
    width: min(80vw, 800px);
    height: 1px;
    background: var(--accent-line);
    opacity: 0;
    animation: lineGrow 1s ease forwards 0.3s;
  }
  .top-rule::before {
    content: '§';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.8rem, 1.2vw, 1rem);
    color: var(--accent-crimson);
    background: var(--bg-cream);
    padding: 0 12px;
  }

  @keyframes lineGrow {
    from { opacity: 0; width: 0; }
    to { opacity: 1; width: min(80vw, 800px); }
  }

  .bottom-rule {
    position: absolute;
    bottom: clamp(2rem, 5vh, 4rem);
    left: 50%;
    transform: translateX(-50%);
    width: min(80vw, 800px);
    height: 1px;
    background: var(--accent-line);
    opacity: 0;
    animation: lineGrow 1s ease forwards 0.5s;
  }

  /* === CONTENT === */
  .content {
    text-align: center;
    max-width: min(85vw, 750px);
    padding: clamp(1rem, 3vw, 3rem);
  }

  .drop-cap {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 10vw, 8rem);
    font-weight: 700;
    color: var(--accent-crimson);
    line-height: 0.85;
    margin-bottom: clamp(0.3rem, 1vh, 0.8rem);
    opacity: 0;
    animation: dropIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-20px) scale(1.1); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--title-size);
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 0.5s;
  }

  .pull-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2vw, 1.5rem);
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.6;
    border-left: 3px solid var(--accent-crimson);
    padding-left: clamp(0.8rem, 2vw, 1.5rem);
    margin: clamp(1rem, 2.5vh, 2rem) auto;
    max-width: 50ch;
    text-align: left;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 0.8s;
  }

  .meta {
    font-family: 'Source Serif 4', serif;
    font-size: var(--small-size);
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: clamp(1rem, 3vh, 2rem);
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1s;
  }
  .meta span {
    color: var(--accent-crimson);
  }

  /* === PAGE NUMBER === */
  .page-num {
    position: absolute;
    bottom: clamp(2.5rem, 6vh, 5rem);
    right: clamp(2rem, 4vw, 4rem);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.7rem, 1vw, 0.9rem);
    color: var(--text-muted);
    opacity: 0;
    animation: fadeIn 0.5s ease forwards 1.1s;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === STYLE LABEL === */
  .style-label {
    position: fixed;
    top: clamp(8px, 1.5vh, 16px);
    left: clamp(8px, 1.5vw, 16px);
    background: rgba(26,26,26,0.08);
    color: var(--text-secondary);
    padding: 4px 12px;
    border-radius: 4px;
    font-size: clamp(0.55rem, 0.9vw, 0.75rem);
    font-family: 'Source Serif 4', serif;
    letter-spacing: 0.08em;
    z-index: 10;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.2s !important;
    }
  }
</style>
</head>
<body>
  <div class="style-label">STYLE B — PAPER & INK</div>
  <div class="slide">
    <div class="top-rule"></div>
    <div class="content">
      <div class="drop-cap">A</div>
      <h1>AI 赋能 FX 工作方式<br/>三级跳</h1>
      <div class="pull-quote">
        "从手工操作到效率工具，从效率工具到决策引擎，从决策引擎到 AI Agent —— 每一次跃升，都源于对现状的不满足。"
      </div>
      <div class="meta">Internal Presentation <span>·</span> 2026 <span>·</span> 15 Slides</div>
    </div>
    <div class="bottom-rule"></div>
    <div class="page-num">— 01 —</div>
  </div>
</body>
</html>
