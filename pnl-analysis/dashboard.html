<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>损益分析工具 — 上传 → 分析 → 导出</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #1F4E79; --primary-light: #2E75B6; --accent: #548235;
  --bg: #f5f7fa; --card-bg: #fff; --text: #2c3e50; --text2: #7f8c8d;
  --border: #e0e6ed; --green: #27ae60; --red: #e74c3c; --yellow: #f39c12;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:white; padding:20px 32px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.header h1 { font-size:22px; font-weight:600; }
.header .sub { font-size:13px; opacity:.8; margin-top:4px; }
.hdr-right { display:flex; gap:10px; align-items:center; }
.hdr-right select,.hdr-right button { padding:8px 16px; border-radius:6px; border:1px solid rgba(255,255,255,.3); background:rgba(255,255,255,.15); color:white; font-size:13px; cursor:pointer; }
.hdr-right select:hover,.hdr-right button:hover { background:rgba(255,255,255,.25); }
.hdr-right select option { color:var(--text); background:white; }
.btn-export { background:var(--accent)!important; border-color:var(--accent)!important; font-weight:600; }

.main { max-width:1440px; margin:0 auto; padding:24px; }

/* ═══ Upload Zone ═══ */
.upload-zone { border:3px dashed var(--border); border-radius:var(--radius); background:var(--card-bg); padding:60px 40px; text-align:center; cursor:pointer; margin-bottom:24px; transition:all .2s; }
.upload-zone:hover,.upload-zone.dragover { border-color:var(--primary); background:#eef3f9; }
.upload-icon { font-size:48px; margin-bottom:12px; }
.upload-title { font-size:18px; font-weight:600; margin-bottom:8px; }
.upload-hint { font-size:13px; color:var(--text2); margin-bottom:16px; }
.upload-btn-main { display:inline-block; padding:10px 28px; background:var(--primary); color:white; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; }
.upload-btn-main:hover { background:var(--primary-light); }
#fileInput { display:none; }
.file-list { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; justify-content:center; }
.file-chip { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; background:#e8f5e9; color:#2e7d32; border-radius:20px; font-size:12px; font-weight:500; }
.upload-progress { display:none; margin-top:16px; }
.progress-bar { width:100%; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--primary); border-radius:3px; transition:width .3s; }
.progress-text { font-size:12px; color:var(--text2); margin-top:6px; }

/* ═══ Results ═══ */
.results { display:none; }
.results.show { display:block; }

/* KPI */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:20px; }
.kpi-card { background:var(--card-bg); border-radius:var(--radius); padding:18px; box-shadow:0 1px 4px rgba(0,0,0,.06); border-left:4px solid var(--primary); }
.kpi-card.positive { border-left-color:var(--green); }
.kpi-card.negative { border-left-color:var(--red); }
.kpi-card.neutral { border-left-color:var(--yellow); }
.kpi-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
.kpi-value { font-size:22px; font-weight:700; margin-top:4px; }
.kpi-value.positive { color:var(--green); }
.kpi-value.negative { color:var(--red); }
.kpi-sub { font-size:11px; color:var(--text2); margin-top:3px; }

/* Month Compare Grid */
.month-grid { display:grid; gap:20px; margin-bottom:24px; }
.month-grid.cols-2 { grid-template-columns:1fr 1fr; }
.month-grid.cols-3 { grid-template-columns:1fr 1fr 1fr; }
.month-box { background:var(--card-bg); border-radius:var(--radius); padding:20px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.month-box h3 { font-size:15px; font-weight:600; color:var(--primary); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.month-box h3 .badge { font-size:11px; padding:2px 8px; border-radius:10px; }
.badge-month { background:#e3f2fd; color:#1565c0; }
.badge-total { background:#e8f5e9; color:#2e7d32; }

/* Mini KPI inside month box */
.mini-kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.mini-kpi { text-align:center; }
.mini-kpi .label { font-size:11px; color:var(--text2); }
.mini-kpi .val { font-size:18px; font-weight:700; margin-top:2px; }
.mini-kpi .val.positive { color:var(--green); }
.mini-kpi .val.negative { color:var(--red); }

/* Charts */
.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
.chart-box { background:var(--card-bg); border-radius:var(--radius); padding:20px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.chart-box h3 { font-size:14px; color:var(--primary); margin-bottom:12px; }
.chart-box canvas { max-height:300px; }

/* Dim Tabs */
.tab-bar { display:flex; gap:4px; background:var(--card-bg); border-radius:var(--radius); padding:4px; margin-bottom:20px; box-shadow:0 1px 4px rgba(0,0,0,.06); overflow-x:auto; align-items:center; }
.tab-btn { padding:10px 18px; border:none; background:transparent; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text2); white-space:nowrap; }
.tab-btn:hover { background:var(--bg); color:var(--text); }
.tab-btn.active { background:var(--primary); color:white; }
.tab-btn.cmp-tab { background:#fff3e0; color:#e65100; border:1px solid #ffcc80; }
.tab-btn.cmp-tab:hover { background:#ffe0b2; }
.tab-btn.cmp-tab.active { background:#e65100; color:white; border-color:#e65100; }

/* Table */
.panel { background:var(--card-bg); border-radius:var(--radius); padding:24px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:24px; }
.panel-title { font-size:16px; font-weight:600; margin-bottom:16px; color:var(--primary); }
.data-table-wrapper { overflow-x:auto; max-height:600px; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { background:var(--primary); color:white; padding:10px 12px; text-align:left; font-weight:600; position:sticky; top:0; white-space:nowrap; z-index:1; }
tbody td { padding:8px 12px; border-bottom:1px solid var(--border); }
tbody tr:hover { background:#f0f4f8; }
tbody tr.total-row { background:#D6E4F0; font-weight:700; }
td.amt { text-align:right; font-variant-numeric:tabular-nums; }
td.amt.positive { color:var(--green); }
td.amt.negative { color:var(--red); }

.export-banner { background:linear-gradient(135deg,#548235,#6ba84a); color:white; border-radius:var(--radius); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; box-shadow:0 2px 8px rgba(84,130,53,.3); }
.export-banner h3 { font-size:15px; }
.export-banner p { font-size:13px; opacity:.9; margin-top:2px; }
.export-banner button { padding:10px 24px; background:white; color:#548235; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
.export-banner button:hover { background:#f0f0f0; }

.loading { display:flex; align-items:center; justify-content:center; padding:60px; color:var(--text2); }
.spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; margin-right:12px; }
@keyframes spin { to { transform:rotate(360deg); } }

.toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:8px; font-size:13px; font-weight:500; z-index:1000; transform:translateY(100px); opacity:0; transition:all .3s; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { background:var(--green); color:white; }
.toast.error { background:var(--red); color:white; }
.toast.info { background:var(--primary); color:white; }

@media (max-width:900px) {
  .charts-row,.month-grid.cols-2,.month-grid.cols-3 { grid-template-columns:1fr; }
  .kpi-row { grid-template-columns:repeat(2,1fr); }
  .header { flex-direction:column; gap:12px; }
  .export-banner { flex-direction:column; gap:12px; text-align:center; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 损益分析工具</h1>
    <div class="sub">上传 CSV/Excel → 自动分析 → 导出报表</div>
  </div>
  <div class="hdr-right" id="headerControls" style="display:none;">
    <button onclick="exportExcel('all')">📥 导出全量 Excel</button>
    <button onclick="showUpload()" style="background:rgba(255,255,255,.1)">📁 上传新文件</button>
  </div>
</div>

<div class="main">

  <!-- ═══ Upload ═══ -->
  <div id="uploadSection">
    <div class="upload-zone" id="uploadZone"
         onclick="document.getElementById('fileInput').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleDrop(event)">
      <div class="upload-icon">📂</div>
      <div class="upload-title">上传损益明细文件</div>
      <div class="upload-hint">
        支持 <strong>PROFIT_LOSS_DETAIL_*.csv</strong> 或同格式 Excel<br>
        可同时上传多个月份文件，支持拖拽
      </div>
      <button class="upload-btn-main" onclick="event.stopPropagation();document.getElementById('fileInput').click()">选择文件</button>
      <input type="file" id="fileInput" multiple accept=".csv,.xlsx,.xls" onchange="handleFiles(this.files)">
      <div class="file-list" id="fileList"></div>
      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-text" id="progressText">正在上传和分析...</div>
      </div>
    </div>
  </div>

  <!-- ═══ Results ═══ -->
  <div class="results" id="resultsSection">

    <!-- Export Banner -->
    <div class="export-banner">
      <div>
        <h3>✅ 分析完成</h3>
        <p id="exportInfo">已分析 0 个月份</p>
      </div>
      <button onclick="exportExcel('all')">📥 下载 Excel 报表</button>
    </div>

    <!-- ═══ Month Compare Overview ═══ -->
    <div id="monthOverview"></div>

    <!-- Charts + Table: unified period selector -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <span style="font-size:14px;font-weight:600;color:var(--primary);">📅 查看月份：</span>
      <select id="periodSelect" onchange="onPeriodChange()" style="padding:8px 16px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-weight:500;background:var(--card-bg);color:var(--text);cursor:pointer;min-width:160px;">
        <option value="all">全量 (累计)</option>
      </select>
      <button onclick="exportExcel()" style="padding:8px 16px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:white;font-size:13px;font-weight:500;cursor:pointer;margin-left:auto;">📥 导出当前月份 Excel</button>
    </div>

    <!-- Charts for selected period -->
    <div class="charts-row">
      <div class="chart-box">
        <h3 id="chartTitle1">📊 分渠道损益</h3>
        <canvas id="entityChart"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="chartTitle2">📊 损益拆解: WX vs FIT</h3>
        <canvas id="waterfallChart"></canvas>
      </div>
    </div>

    <!-- Dim Tabs + Table -->
    <div class="tab-bar" id="tabBar">
      <!-- 月度对比 tabs (highlighted) -->
      <button class="tab-btn cmp-tab" data-cmp="损益实际归属主体" onclick="switchCmpTab(this)">📅 对比-按渠道</button>
      <button class="tab-btn cmp-tab" data-cmp="所属业务" onclick="switchCmpTab(this)">📅 对比-按业务</button>
      <button class="tab-btn cmp-tab" data-cmp="原币种" onclick="switchCmpTab(this)">📅 对比-按币种</button>
      <span style="width:1px;background:var(--border);margin:4px 2px;"></span>
      <!-- 单月维度 tabs -->
      <button class="tab-btn active" data-dim="entity" onclick="switchTab(this)">按渠道</button>
      <button class="tab-btn" data-dim="business" onclick="switchTab(this)">按业务</button>
      <button class="tab-btn" data-dim="product" onclick="switchTab(this)">按产品</button>
      <button class="tab-btn" data-dim="currency" onclick="switchTab(this)">按币种</button>
      <button class="tab-btn" data-dim="merchant_type" onclick="switchTab(this)">按商户类型</button>
      <button class="tab-btn" data-dim="entity_business" onclick="switchTab(this)">渠道×业务</button>
      <button class="tab-btn" data-dim="entity_currency" onclick="switchTab(this)">渠道×币种</button>
      <button class="tab-btn" data-dim="merchant" onclick="switchTab(this)">按商户号</button>
      <button class="tab-btn" data-dim="detail" onclick="switchTab(this)">明细汇总</button>
    </div>

    <div class="panel">
      <div class="panel-title" id="tableTitle">📋 分渠道汇总</div>
      <div class="data-table-wrapper" id="tableContainer">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let allPeriods = []; // [{label, date_str, records}, ...]
let currentPeriod = 'all';
let currentDim = 'entity';
let entityChart = null, waterfallChart = null;

// ═══ Upload ═══
function handleDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); }

async function handleFiles(files) {
  if(!files||!files.length) return;
  const fl = document.getElementById('fileList');
  fl.innerHTML = ''; Array.from(files).forEach(f => fl.innerHTML += `<span class="file-chip">📄 ${f.name}</span>`);
  const prog = document.getElementById('uploadProgress');
  const fill = document.getElementById('progressFill');
  const txt = document.getElementById('progressText');
  prog.style.display='block'; fill.style.width='30%'; txt.textContent='正在上传...';

  const fd = new FormData();
  Array.from(files).forEach(f => fd.append('files', f));

  try {
    fill.style.width='60%'; txt.textContent='正在分析数据...';
    const res = await fetch(`${API}/api/upload`,{method:'POST',body:fd});
    const data = await res.json();
    if(data.error) { fill.style.width='100%'; fill.style.background='var(--red)'; txt.textContent='❌ '+data.error; return; }
    fill.style.width='100%'; fill.style.background='var(--green)';
    txt.textContent=`✅ 完成！${data.periods.length} 个月份`;
    showToast('分析完成！','success');
    setTimeout(()=> enterResults(data.periods), 600);
  } catch(e) { fill.style.width='100%'; fill.style.background='var(--red)'; txt.textContent='❌ '+e.message; }
}

// ═══ Enter Results ═══
function enterResults(periods) {
  allPeriods = periods;
  document.getElementById('uploadSection').style.display='none';
  document.getElementById('resultsSection').classList.add('show');
  document.getElementById('headerControls').style.display='flex';
  const total = periods.reduce((s,p)=>s+p.records,0);
  document.getElementById('exportInfo').textContent = `已分析 ${periods.length} 个月份 · 共 ${total.toLocaleString()} 条记录`;
  loadMonthOverview();
  buildPeriodSelect();
  currentPeriod = 'all';
  refreshDetail();
}

function showUpload() {
  document.getElementById('uploadSection').style.display='block';
  document.getElementById('resultsSection').classList.remove('show');
  document.getElementById('headerControls').style.display='none';
  document.getElementById('fileList').innerHTML='';
  document.getElementById('uploadProgress').style.display='none';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressFill').style.background='var(--primary)';
}

// ═══ Month Overview — 分月 + 总量 ═══
async function loadMonthOverview() {
  const container = document.getElementById('monthOverview');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>加载月度概览...</div>';

  // 并行拉取每月 + 全量
  const fetches = [
    ...allPeriods.map(p => fetch(`${API}/api/overview?period=${encodeURIComponent(p.label)}`).then(r=>r.json())),
    fetch(`${API}/api/overview?period=all`).then(r=>r.json()),
  ];

  try {
    const results = await Promise.all(fetches);
    const monthData = results.slice(0, allPeriods.length);
    const totalData = results[results.length - 1];

    const cols = allPeriods.length + 1; // months + total
    const gridClass = cols <= 2 ? 'cols-2' : 'cols-3';

    let html = `<div class="month-grid ${gridClass}">`;

    // Each month
    allPeriods.forEach((p, i) => {
      const o = monthData[i].overview;
      html += monthBoxHTML(p.label, o, 'month', p.records);
    });

    // Total
    const ot = totalData.overview;
    const totalRecords = allPeriods.reduce((s,p)=>s+p.records, 0);
    html += monthBoxHTML('累计总量', ot, 'total', totalRecords);

    html += '</div>';
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<div style="color:var(--red);text-align:center;padding:20px;">加载失败: ${e.message}</div>`;
  }
}

function monthBoxHTML(title, o, type, records) {
  const badgeClass = type === 'total' ? 'badge-total' : 'badge-month';
  const badgeText = type === 'total' ? '合计' : `${records} 条`;
  const cls = v => v > 0 ? 'positive' : (v < 0 ? 'negative' : '');

  return `
    <div class="month-box">
      <h3>${title} <span class="badge ${badgeClass}">${badgeText}</span></h3>
      <div class="mini-kpis">
        <div class="mini-kpi">
          <div class="label">损益金额</div>
          <div class="val ${cls(o.total_pnl)}">${fmtAmt(o.total_pnl)}</div>
        </div>
        <div class="mini-kpi">
          <div class="label">其中 WX</div>
          <div class="val ${cls(o.total_wx)}">${fmtAmt(o.total_wx)}</div>
        </div>
        <div class="mini-kpi">
          <div class="label">FIT</div>
          <div class="val ${cls(o.total_fit)}">${fmtAmt(o.total_fit)}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;font-size:12px;color:var(--text2);">
        <div>渠道: <strong style="color:var(--text)">${o.entity_count}</strong>　业务: <strong style="color:var(--text)">${o.business_count}</strong></div>
        <div>币种: <strong style="color:var(--text)">${o.currency_count}</strong>　商户: <strong style="color:var(--text)">${o.merchant_count}</strong></div>
        <div>盈利: <strong style="color:var(--green)">${o.pnl_positive_count}</strong></div>
        <div>亏损: <strong style="color:var(--red)">${o.pnl_negative_count}</strong>　持平: ${o.pnl_zero_count}</div>
      </div>
    </div>
  `;
}

// ═══ Period Select Dropdown ═══
function buildPeriodSelect() {
  const sel = document.getElementById('periodSelect');
  sel.innerHTML = '<option value="all">全量 (累计)</option>';
  allPeriods.forEach(p => {
    sel.innerHTML += `<option value="${p.label}">${p.label} — ${p.records} 条</option>`;
  });
}

function onPeriodChange() {
  currentPeriod = document.getElementById('periodSelect').value;
  refreshDetail();
}

function refreshDetail() {
  const label = currentPeriod === 'all' ? '全量' : currentPeriod;
  document.getElementById('chartTitle1').textContent = `📊 ${label} — 分渠道损益`;
  document.getElementById('chartTitle2').textContent = `📊 ${label} — WX vs FIT`;
  loadEntityChart();
  loadWaterfallChart();
  loadSummary(currentDim);
}

// ═══ Charts ═══
async function loadEntityChart() {
  try {
    const res = await fetch(`${API}/api/waterfall?period=${encodeURIComponent(currentPeriod)}&dimension=entity`);
    const d = await res.json(); if(d.error) return;
    if(entityChart) entityChart.destroy();
    entityChart = new Chart(document.getElementById('entityChart').getContext('2d'), {
      type:'bar',
      data:{labels:d.labels,datasets:[{label:'损益金额',data:d.pnl,backgroundColor:d.pnl.map(v=>v>=0?'#27ae60':'#e74c3c')}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtAmt(c.raw)+' 元'}}},scales:{y:{ticks:{callback:v=>fmtAmt(v)}}}}
    });
  } catch(e) { console.error(e); }
}

async function loadWaterfallChart() {
  try {
    const res = await fetch(`${API}/api/waterfall?period=${encodeURIComponent(currentPeriod)}&dimension=entity`);
    const d = await res.json(); if(d.error) return;
    if(waterfallChart) waterfallChart.destroy();
    waterfallChart = new Chart(document.getElementById('waterfallChart').getContext('2d'), {
      type:'bar',
      data:{labels:d.labels,datasets:[{label:'其中WX',data:d.wx,backgroundColor:'#f39c12',stack:'s'},{label:'FIT',data:d.fit,backgroundColor:'#2E75B6',stack:'s'}]},
      options:{responsive:true,plugins:{tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmtAmt(c.raw)+' 元'}}},scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>fmtAmt(v)}}}}
    });
  } catch(e) { console.error(e); }
}

// ═══ Table ═══
const DIM_NAMES = {entity:'按渠道',business:'按业务',product:'按产品',currency:'按币种',merchant_type:'按商户类型',entity_business:'渠道×业务',entity_currency:'渠道×币种',merchant:'按商户号',detail:'明细汇总'};
const CMP_NAMES = {'损益实际归属主体':'按渠道','所属业务':'按业务','原币种':'按币种'};

function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentDim = btn.dataset.dim;
  loadSummary(currentDim);
}

function switchCmpTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const dim = btn.dataset.cmp;
  loadComparison(dim);
}

async function loadComparison(dim) {
  const c = document.getElementById('tableContainer');
  c.innerHTML = '<div class="loading"><div class="spinner"></div>加载月度对比...</div>';
  document.getElementById('tableTitle').textContent = `📅 月度对比 — ${CMP_NAMES[dim]||dim}`;

  try {
    const res = await fetch(`${API}/api/comparison?dimension=${encodeURIComponent(dim)}`);
    const data = await res.json();
    if(data.error) { c.innerHTML=`<div class="loading">${data.error}</div>`; return; }
    renderTable(data.columns, data.data, c);
  } catch(e) { c.innerHTML=`<div class="loading">加载失败: ${e.message}</div>`; }
}

async function loadSummary(dim) {
  const c = document.getElementById('tableContainer');
  c.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
  const periodLabel = currentPeriod==='all'?'全量':currentPeriod;
  document.getElementById('tableTitle').textContent = `📋 ${periodLabel} — ${DIM_NAMES[dim]||dim}汇总`;

  try {
    const res = await fetch(`${API}/api/summary/${dim}?period=${encodeURIComponent(currentPeriod)}`);
    const data = await res.json();
    if(data.error) { c.innerHTML=`<div class="loading">${data.error}</div>`; return; }
    renderTable(data.columns, data.data, c);
  } catch(e) { c.innerHTML='<div class="loading">加载失败</div>'; }
}

function renderTable(cols, rows, container) {
  const amtCols = new Set();
  cols.forEach(c => { if(['损益金额','其中WX','FIT'].some(k=>c.includes(k))) amtCols.add(c); });
  let h = '<table><thead><tr>';
  cols.forEach(c => h += `<th>${c}</th>`);
  h += '</tr></thead><tbody>';
  rows.forEach(row => {
    const f = String(row[cols[0]]||'');
    const isT = ['合计','小计','汇总'].some(k=>f.includes(k));
    h += `<tr class="${isT?'total-row':''}">`;
    cols.forEach(c => {
      const v = row[c];
      if(amtCols.has(c)&&typeof v==='number') {
        h += `<td class="amt ${v>0?'positive':v<0?'negative':''}">${fmtNum(v)}</td>`;
      } else {
        h += `<td>${v===null||v===undefined?'':v}</td>`;
      }
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  container.innerHTML = '<div class="data-table-wrapper">'+h+'</div>';
}

// ═══ Export ═══
function exportExcel(period) {
  const p = period || currentPeriod || 'all';
  window.open(`${API}/api/export?period=${encodeURIComponent(p)}`);
}

// ═══ Utils ═══
function fmtNum(v) { if(v==null||isNaN(v)) return ''; return Math.round(v).toLocaleString('zh-CN'); }
function fmtAmt(v) {
  if(Math.abs(v)>=1e8) return (v/1e8).toFixed(2)+'亿';
  if(Math.abs(v)>=1e4) return (v/1e4).toFixed(1)+'万';
  return Math.round(v).toLocaleString();
}
function showToast(msg,type='info') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`; setTimeout(()=>t.classList.remove('show'),3000); }

// ═══ Init: auto-detect preloaded data ═══
async function init() {
  try {
    const res = await fetch(`${API}/api/periods`);
    const data = await res.json();
    if(data.periods && data.periods.length > 0) {
      // Has preloaded data → skip upload, go straight to results
      enterResults(data.periods);
    }
  } catch(e) {}
}
init();
</script>
